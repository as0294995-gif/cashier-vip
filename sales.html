<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المبيعات</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#1b1f2b;
    color:white;
    font-family:Arial;
    padding:30px;
}

input{
    width:100%;
    padding:15px;
    font-size:20px;
    border-radius:10px;
    border:none;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    color:black;
}

th,td{
    border:1px solid #ccc;
    padding:12px;
    text-align:center;
}

th{
    background:#00bcd4;
    color:white;
}
</style>

</head>

<body>

<h1>🛒 شاشة المبيعات</h1>

<input type="text" placeholder="ابحث عن المنتج أو امسح الباركود">

<table>

<tr>
<th>الصنف</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>
</tr>

</table>

</body>
</html>
