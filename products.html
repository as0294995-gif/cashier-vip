<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة المنتجات</title>

<link rel="stylesheet" href="style.css">

<style>

.form{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin:20px 0;
}

.form input{
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
}

.add-btn{
padding:12px;
background:#27ae60;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.add-btn:hover{
background:#2ecc71;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#3fa9f5;
color:white;
padding:12px;
}

td{
background:#fff;
color:#000;
padding:10px;
text-align:center;
}

</style>

</head>

<body>

<div class="main">

<h1>📦 إدارة المنتجات</h1>

<div class="form">

<input id="barcode" placeholder="الباركود">

<input id="name" placeholder="اسم المنتج">

<input id="price" placeholder="السعر">

<input id="qty" placeholder="الكمية">

</div>

<button class="add-btn" onclick="addProduct()">
➕ إضافة المنتج
</button>

<table>

<thead>

<tr>

<th>الباركود</th>
<th>اسم المنتج</th>
<th>السعر</th>
<th>الكمية</th>

</tr>

</thead>

<tbody id="products">

</tbody>

</table>

</div>

<script>

function addProduct(){

let barcode=document.getElementById("barcode").value;
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let qty=document.getElementById("qty").value;

if(barcode==""||name=="") return;

document.getElementById("products").innerHTML+=`

<tr>

<td>${barcode}</td>

<td>${name}</td>

<td>${price}</td>

<td>${qty}</td>

</tr>

`;

document.getElementById("barcode").value="";
document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("qty").value="";

}

</script>

</body>

</html>
